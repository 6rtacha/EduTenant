services:
  postgres-test:
    image: postgres:16-alpine
    container_name: edutenant-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: edutenant
      POSTGRES_PASSWORD: edutenant
      POSTGRES_DB: edutenant_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edutenant -d edutenant_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - edutenant-postgres-test-data:/var/lib/postgresql/data

volumes:
  edutenant-postgres-test-data:
